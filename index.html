<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mpgink</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ------------------------------
   DESIGN TOKENS
--------------------------------*/
:root {
  --bg-start: #0a0e27;
  --bg-end: #1a1f3a;
  --text: #e8e8e8;
  --text-muted: #a0a0a0;
  --accent: #ff6b35;
  --accent-secondary: #ffd23f;
  --card-bg: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
}

/* ------------------------------
   GLOBAL
--------------------------------*/
body {
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 30% 20%, var(--bg-start), var(--bg-end));
  color: var(--text);
  overflow-x: hidden;
}

/* Subtle noise texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVQIW2P4//8/AwAI/AL+WcN6WQAAAABJRU5ErkJggg==');
  opacity: 0.12;
  pointer-events: none;
}

/* ------------------------------
   MENU
--------------------------------*/
.menu-container {
  position: fixed;
  top: 32px;
  right: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1000;
  cursor: pointer;
}

.menu-icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 0 0 0 rgba(255,255,255,0.15);
}

.menu-container:hover .menu-icon {
  transform: scale(1.08);
  box-shadow: 0 0 12px rgba(255,255,255,0.25);
}

.menu-label {
  font-size: 0.95rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

@media (max-width: 768px) {
  .menu-label {
    display: none;
  }
}

/* ------------------------------
   HERO SECTION
--------------------------------*/
.hero {
  position: relative;
  height: 90vh;
  max-height: 900px;
  display: flex;
  align-items: center;
  padding: 0 8vw;
  overflow: hidden;
}

/* Ambient glow behind image */
.hero::before {
  content: "";
  position: absolute;
  left: 10%;
  top: 40%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  filter: blur(80px);
  transform: translate(-50%, -50%);
  z-index: 0;
}

/* Hero image */
.hero-image {
  position: absolute;
  left: 5%;
  top: 50%;
  width: 40vw;
  max-width: 600px;
  transform: translateY(-50%);
  opacity: 0.9;
  filter: brightness(0.85);
  mask-image: radial-gradient(circle, black 60%, transparent 100%);
  animation: drift 18s ease-in-out infinite alternate;
  z-index: 1;
}

@keyframes drift {
  from { transform: translateY(-50%) translateX(0); }
  to   { transform: translateY(-52%) translateX(1.5%); }
}

/* Text block */
.hero-text {
  position: relative;
  margin-left: 48%;
  z-index: 2;
  max-width: 520px;
}

.hero-text h1 {
  font-family: 'Fraunces', serif;
  font-size: 3.4rem;
  font-weight: 800;
  margin: 0 0 20px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.2s;
}

.hero-text p {
  font-size: 1.2rem;
  color: var(--text-muted);
  margin: 0 0 32px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.4s;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* CTA buttons */
.cta-row {
  display: flex;
  gap: 16px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.6s;
}

.cta {
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 600;
  text-decoration: none;
  color: var(--text);
  transition: all 0.3s ease;
}

.cta-primary {
  background: var(--accent);
  box-shadow: 0 0 0 rgba(255,107,53,0.4);
}

.cta-primary:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 18px rgba(255,107,53,0.45);
}

.cta-secondary {
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
}

.cta-secondary:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.1);
}

/* Scroll cue */
.scroll-cue {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.4rem;
  opacity: 0.6;
  animation: pulse 2.4s infinite ease-in-out;
}

@keyframes pulse {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
  50%      { transform: translateX(-50%) translateY(6px); opacity: 1; }
}

/* ------------------------------
   TRANSITION TO CONTENT
--------------------------------*/
.hero-transition {
  height: 80px;
  background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.25), transparent);
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-container">
  <div class="menu-icon" style="background-image:url('images/image_5.png');"></div>
  <div class="menu-label">Menu</div>
</div>

<!-- HERO -->
<section class="hero">

<img src="images/image_1.jpg" class="hero-image" alt="mpgink header">

  <div class="hero-text">
    <h1>You’re here. Let’s begin.</h1>
    <p>A space to make, explore, or simply breathe.</p>

    <div class="cta-row">
      <a href="#studio" class="cta cta-primary">Explore the Studio</a>
      <a href="https://www.etsy.com/shop/MattyMatteModgePodge" class="cta cta-secondary">Visit the Shop</a>
    </div>
  </div>

  <div class="scroll-cue">⌄</div>
</section>

<div class="hero-transition"></div>

</body>
</html>
